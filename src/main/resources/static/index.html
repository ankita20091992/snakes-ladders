<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snakes & Ladders</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <h1>Snakes &amp; Ladders</h1>

        <!-- Player info -->
        <div class=""player-info">
        <!-- player1-card : tells whose turn it is -->
            <div class="player-card" id="player1-card">
                <div class="token p1-token">P1</div>
                <div>Player 1</div>
        <!-- p1-position:shows current square number -->
                <div id="p1-position">Square: 0</div>
            </div>
            <div class="player-card" id="player2-card">
                <div class="token p2-token">P2</div>
                <div>Player 2</div>
                <div id="p2-position">Square: 0</div>
            </div>
        </div>

        <!-- Game board - squares are built by game.js -->
         <!-- id=board empty-game.js will create 100 <div> squares inside it -->
        <div class="board" id="board"></div>

        <!-- Dice + buttons -->
        <div class="controls">
        <!-- dice-display : show the rolled number -->
            <div class="dice-display" id="dice-display">?</div>
        <!-- roll-btn : triggers rollDice() -->
            <button id="roll-btn" onClick="rollDice()">Roll Dice</button>
            <button id="reset-btn" onClick="resetGame()">Reset</button>
        </div>
        <!-- Status message -->
         <!-- message: show snake/ladder/turn messages -->
        <div class="message" id="message">Press Reset to start the game.</div>
        <!-- Winner banner -->
         <!-- winner-banner : shown only when status=finished -->
        <div class="winner-banner" id="winner-banner">
            <h2 id="winner-text"></h2>
            <button onclick="resetGame()">Play Again</button>
        </div>
    </div>
    <script src="game.js"></script>
</body>
</html>
